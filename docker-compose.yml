services:
  audio-server:
    build: .
    ports:
      - "8002:8000"
    restart: unless-stopped
    env_file:
      - path: .env
        required: false   # container still starts without .env; env vars just won't be set
    environment:
      - PYTHONUNBUFFERED=1
    tmpfs:
      - /tmp        # yt-dlp writes temp files here; keeps the container FS clean
    volumes:
      # cookies_store is a named volume — cookies uploaded via POST /cookies
      # survive container rebuilds and restarts automatically.
      #
      # Alternative: bind-mount a file directly (takes precedence if COOKIES_FILE is overridden):
      # - ./cookies.txt:/app/cookies_store/cookies.txt:ro
      - cookies_data:/app/cookies_store
      - cache_data:/app/cache

volumes:
  cookies_data:
  cache_data:
